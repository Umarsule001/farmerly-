<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard — Farmerly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <header class="site-header bg-gradient">
      <div class="container d-flex align-items-center justify-content-between py-3">
        <a class="brand d-flex align-items-center gap-3" href="index.html"><span class="brand-badge"></span><span class="brand-text">Farmerly</span></a>
        <nav class="d-flex align-items-center gap-2">
          <button id="theme-toggle" class="btn btn-sm btn-outline-light" title="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
          <button class="btn btn-sm btn-outline-light me-2" onclick="exportData(true)"><i class="fa-solid fa-file-export"></i> Export</button>
          <input id="import-file-fd" type="file" accept="application/json" onchange="handleImportFile(event)" style="display:none">
          <button class="btn btn-sm btn-light me-2" onclick="document.getElementById('import-file-fd').click()"><i class="fa-solid fa-file-import"></i> Import</button>
          <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
        </nav>
      </div>
    </header>
    <main class="container py-5">
      <div class="row">
        <div class="col-md-8">
          <div class="panel mb-4 modern-panel">
            <h4 class="mb-2">Farmer Dashboard</h4>
            <p class="mb-1"><strong>Name:</strong> <span id="fd-name">—</span></p>
            <p class="mb-1"><strong>Contact:</strong> <span id="fd-contact">—</span></p>
            <p class="mb-0"><strong>Farm:</strong> <span id="fd-farm">—</span></p>
          </div>

          <div class="panel modern-panel">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="mb-0">Loan Applications</h5>
              <a class="small text-muted" href="loan-app.html">New application</a>
            </div>
            <table class="table">
              <thead><tr><th>Amount</th><th>Status</th><th>Applied</th></tr></thead>
              <tbody id="fd-loans"></tbody>
            </table>
            <div class="d-flex gap-2">
              <a class="btn btn-success" href="loan-app.html">Apply for Loan</a>
              <a class="btn btn-outline-secondary" href="farmer-portal.html">Farmer Portal</a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="panel">
            <h6>Quick Resources</h6>
            <ul class="list-unstyled small text-muted">
              <li>Fertilizer guide</li>
              <li>Seed recommendations</li>
              <li>Market links</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
    <script>renderFarmerDashboard();</script>
  </body>
</html>
