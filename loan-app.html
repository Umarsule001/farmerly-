<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apply Loan — Farmerly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <button id="theme-toggle" class="theme-fab" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="auth-card">
            <h4 class="mb-2">Loan Application</h4>
            <p class="small text-muted mb-3">Apply for a small loan. </p>
            <form onsubmit="handleLoanApply(event)">
              <div class="mb-3"><input name="amount" type="number" step="0.01" class="form-control form-control-lg" placeholder="Amount (USD)" required></div>
              <div class="mb-3"><textarea name="reason" class="form-control" placeholder="Reason/Notes"></textarea></div>
              <div class="d-grid gap-2">
                <button class="btn btn-success btn-lg">Submit Application</button>
                <a class="btn btn-outline-secondary" href="farmer-dashboard.html">Back</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
