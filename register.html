<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register — Farmerly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="farm-bg.css">
  </head>
  <body class="farm-bg">
    <button id="theme-toggle" class="theme-fab" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="auth-card">
            <h3 class="mb-2">Create your account</h3>
            <p class="small text-muted mb-3">Register to start tracking your farm and accessing loan tools.</p>
            <form onsubmit="handleRegister(event)">
              <div class="row">
                <div class="col-md-6 mb-3"><input name="name" class="form-control form-control-lg" placeholder="Full name" required></div>
                <div class="col-md-6 mb-3"><input name="email" type="email" class="form-control form-control-lg" placeholder="Email" required></div>
              </div>
              <div class="mb-3"><input name="password" type="password" class="form-control form-control-lg" placeholder="Password" required></div>
              <div class="mb-3">
                <select name="role" class="form-select form-select-lg">
                  <option value="farmer">Farmer</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div class="mb-3"><input name="farm_details" class="form-control" placeholder="Farm details (optional)"></div>
              <div class="mb-3"><input name="contact" class="form-control" placeholder="Contact (optional)"></div>
              <div class="d-grid gap-2">
                <button class="btn btn-success btn-lg"><i class="fa-solid fa-user-plus me-2"></i> Create account</button>
                <a class="btn btn-outline-secondary" href="login.html">Back to login</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
