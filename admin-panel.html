<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel — Farmerly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <header class="site-header bg-gradient">
      <div class="container d-flex align-items-center justify-content-between py-3">
        <a class="brand d-flex align-items-center gap-3" href="index.html"><span class="brand-badge"></span><span class="brand-text">Farmerly</span></a>
        <nav class="d-flex align-items-center gap-2">
          <button id="theme-toggle" class="btn btn-sm btn-outline-light" title="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
          <button class="btn btn-sm btn-outline-light me-2" onclick="exportData()"><i class="fa-solid fa-file-export"></i> Export</button>
          <input id="import-file" type="file" accept="application/json" onchange="handleImportFile(event)" style="display:none">
          <button class="btn btn-sm btn-light me-2" onclick="document.getElementById('import-file').click()"><i class="fa-solid fa-file-import"></i> Import</button>
          <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
        </nav>
      </div>
    </header>
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Admin Panel</h4><div></div></div>
      <div class="row g-4 mt-3">
        <div class="col-md-6">
          <div class="panel modern-panel">
            <h6>Farmers</h6>
            <div class="table-responsive">
            <table class="table">
              <thead><tr><th>Name</th><th>Email</th><th>Contact</th></tr></thead>
              <tbody id="admin-users"></tbody>
            </table>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="panel modern-panel">
            <h6>Site Settings</h6>
            <form id="admin-settings" onsubmit="handleSettingsSave(event)">
              <div class="mb-2"><label class="form-label small">Site title</label><input id="setting-title" name="title" class="form-control" placeholder="Farmerly"></div>
              <div class="mb-2"><label class="form-label small">Accent color</label><input id="setting-accent" name="accent" type="color" class="form-control form-control-color" value="#2f8f3f"></div>
              <div class="mb-2"><label class="form-label small">Header background</label>
                <select id="setting-header" name="header" class="form-select">
                  <option value="green">Green gradient</option>
                  <option value="dark">Dark premium</option>
                </select>
              </div>
              <div class="mb-2"><label class="form-label small">Logo (optional)</label><input id="setting-logo" type="file" accept="image/*" class="form-control" onchange="handleLogoUpload(event)"></div>
              <div class="d-flex gap-2"><button class="btn btn-primary">Save settings</button><button type="button" class="btn btn-outline-secondary" onclick="resetSettings()">Reset</button></div>
            </form>
            <div class="mt-3"><small class="text-muted">Changes apply immediately and are stored for all pages.</small></div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="panel modern-panel">
            <h6>Loan Applications</h6>
            <div class="table-responsive">
            <table class="table">
              <thead><tr><th>Farmer</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody id="admin-loans"></tbody>
            </table>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
    <script>renderAdminPanel();</script>
  </body>
</html>
