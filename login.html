<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Farmerly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="farm-bg.css">
  </head>
  <body class="farm-bg">
    <button id="theme-toggle" class="theme-fab" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="auth-card text-center">
            <div class="mb-3"><span class="brand-badge" aria-hidden="true"><!-- small badge --></span></div>
            <h3 class="mb-3">Welcome back</h3>
            <p class="text-muted small mb-3">Sign in to access your Farmerly dashboard.</p>
            <form onsubmit="handleLogin(event)">
              <div class="mb-3"><input name="email" type="email" class="form-control form-control-lg" placeholder="Email address" required></div>
              <div class="mb-3"><input name="password" type="password" class="form-control form-control-lg" placeholder="Password" required></div>
              <div class="d-grid gap-2">
                <button class="btn btn-success btn-lg"><i class="fa-solid fa-right-to-bracket me-2"></i> Sign in</button>
                <a class="btn btn-outline-secondary" href="register.html">Create account</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
